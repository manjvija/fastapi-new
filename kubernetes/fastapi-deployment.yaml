apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-app
  template:
    metadata:
      labels:
        app: fastapi-app
    spec:
      containers:
      - name: fastapi-app
        image: manjvija/fastapi-app:latest   # built inside Minikube
        ports:
        - containerPort: 8000
